  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #fdf6ec;
      --text:   #1a1208;
      --muted:  #5a4020;
      --orange: #e8610a;
      --font-disp: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      gap: 1.5rem;
    }

    .logo-img { width: 84px; height: auto; }

    .eyebrow {
      font-family: var(--font-disp);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--orange);
    }

    h1 {
      font-family: var(--font-disp);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.95;
      max-width: 20ch;
    }

    p {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 32ch;
    }

    a.site-link {
      font-family: var(--font-disp);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1.5px solid var(--orange);
      padding-bottom: 0.2rem;
      margin-top: 0.5rem;
    }

    a.site-link:hover { color: var(--orange); }
  </style>
</head>

  <img class="logo-img" src="images/logo.png" alt="Camp DayFunk" loading="lazy">
