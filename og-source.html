<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #f5ead8;
    font-family: 'Barlow Condensed', sans-serif;
    position: relative;
  }

  /* Film grain */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0.055;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 70% at 62% 50%, rgba(232,97,10,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Ghost BG word */
  .bg-word {
    position: absolute;
    left: -0.05em;
    top: 50%;
    transform: translateY(-50%);
    font-size: 340px;
    font-weight: 900;
    text-transform: uppercase;
    color: #ddc8a8;
    line-height: 1;
    letter-spacing: -0.02em;
    user-select: none;
    white-space: nowrap;
    z-index: 0;
  }

  /* Top rule */
  .top-rule {
    position: absolute;
    top: 48px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: #d4bfa0;
    z-index: 2;
  }

  /* Bottom rule */
  .bottom-rule {
    position: absolute;
    bottom: 48px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: #d4bfa0;
    z-index: 2;
  }

  /* Corner wordmark */
  .corner-tl {
    position: absolute;
    top: 28px;
    left: 60px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #c8aa80;
    z-index: 3;
    line-height: 1;
  }

  .corner-br {
    position: absolute;
    bottom: 28px;
    right: 60px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #c8aa80;
    z-index: 3;
    line-height: 1;
  }

  /* Main layout */
  .layout {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    z-index: 2;
    padding: 0 80px;
    gap: 0;
  }

  /* Logo */
  .logo-wrap {
    flex-shrink: 0;
    width: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo {
    width: 220px;
    height: 220px;
    object-fit: contain;
    filter: drop-shadow(0 8px 32px rgba(26,18,8,0.18));
  }

  /* Divider */
  .divider {
    width: 1px;
    height: 260px;
    background: #d4bfa0;
    margin: 0 60px;
    flex-shrink: 0;
  }

  /* Text block */
  .text-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .eyebrow {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: #e8610a;
    margin-bottom: 14px;
    line-height: 1;
  }

  .title {
    font-size: 148px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.84;
    color: #1a1208;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }

  .dates {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #c87800;
    margin-bottom: 10px;
    line-height: 1;
  }

  .location {
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8a6840;
    line-height: 1;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-word">CAMP</div>

  <div class="top-rule"></div>
  <div class="bottom-rule"></div>

  <div class="corner-tl">Camp DayFunk</div>
  <div class="corner-br">campdayfunk.com</div>

  <div class="layout">
    <div class="logo-wrap">
      <img class="logo"
        src="https://static.wixstatic.com/media/79613e_ec5ff5dc839b468fa5e35b8c06c4c32d~mv2.png/v1/fill/w_896,h_898,al_c,q_90,enc_avif,quality_auto/Ball%20Player.png"
        alt="">
    </div>

    <div class="divider"></div>

    <div class="text-block">
      <div class="eyebrow">July 17 – 19, 2026</div>
      <div class="title">Camp<br>Day<br>Funk</div>
      <div class="location">Bruce, Wisconsin</div>
    </div>
  </div>

</body>
</html>
